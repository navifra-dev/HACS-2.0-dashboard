function badge(type,val){
  if(type==="pri"){if(val==="상")return`<span class="badge b-high">상</span>`;if(val==="중")return`<span class="badge b-mid">중</span>`;return`<span class="badge b-low">${val||"-"}</span>`}
  if(type==="dev"){if(val==="가능")return`<span class="badge b-yes">가능</span>`;if(val==="검토중")return`<span class="badge b-review">검토중</span>`;if(val==="불가능")return`<span class="badge b-no">불가능</span>`;return val}
  if(type==="part"){if(val==="ACS")return`<span class="badge b-acs">ACS</span>`;if(val==="UI/UX")return`<span class="badge b-uiux">UI/UX</span>`;return`<span class="badge b-both">양쪽</span>`}
  return val;
}

function renderTab(containerId, filterFn, showPart=true){
  const el=document.getElementById(containerId);
  const filtered=DATA.filter(filterFn);
  const total=filtered.length;
  const high=filtered.filter(d=>d.pri==="상").length;
  const mid=filtered.filter(d=>d.pri==="중").length;
  const low=filtered.filter(d=>d.pri==="하"||d.pri==="").length;
  const possible=filtered.filter(d=>d.dev==="가능").length;
  const review=filtered.filter(d=>d.dev==="검토중").length;

  let html=`<div class="summary">
    <div class="card"><div class="label">전체 항목</div><div class="val c1">${total}</div></div>
    <div class="card"><div class="label">우선순위 상</div><div class="val c2">${high}</div><div class="bar"><div class="f" style="background:#2e7d32;width:${total?high/total*100:0}%"></div></div></div>
    <div class="card"><div class="label">우선순위 중</div><div class="val c3">${mid}</div><div class="bar"><div class="f" style="background:#1565c0;width:${total?mid/total*100:0}%"></div></div></div>
    <div class="card"><div class="label">우선순위 하/미정</div><div class="val c4">${low}</div></div>
    <div class="card"><div class="label">개발 가능</div><div class="val c2">${possible}</div></div>
    <div class="card"><div class="label">검토중</div><div class="val" style="color:#f57f17">${review}</div></div>
  </div>`;

  html+=`<div class="filters">
    <select onchange="filterTable('${containerId}',this.parentElement)"><option value="">카테고리 전체</option>
    ${[...new Set(filtered.map(d=>d.cat))].sort().map(c=>`<option value="${c}">${c}</option>`).join("")}</select>
    <select onchange="filterTable('${containerId}',this.parentElement)"><option value="">우선순위 전체</option><option>상</option><option>중</option><option>하</option></select>
    <select onchange="filterTable('${containerId}',this.parentElement)"><option value="">개발가능 전체</option><option>가능</option><option>검토중</option><option>불가능</option></select>
    <input type="text" placeholder="기능명 검색..." oninput="filterTable('${containerId}',this.parentElement)">
    <span class="search-count" id="count-${containerId}">${total}개 항목</span>
  </div>`;

  html+=`<div class="tbl-wrap"><table><thead><tr>
    <th>No</th><th>ID</th><th>카테고리</th><th>기능명</th>`;
  if(showPart) html+=`<th>담당</th>`;
  html+=`<th>우선순위</th><th>개발</th><th>ACS 비고</th><th>UI/UX 비고</th></tr></thead><tbody>`;

  filtered.forEach(d=>{
    html+=`<tr data-cat="${d.cat}" data-pri="${d.pri}" data-dev="${d.dev}" data-name="${d.name}">
      <td>${d.no}</td><td>${d.id}</td><td><span class="cat-tag">${d.cat}</span></td><td><b>${d.name}</b></td>`;
    if(showPart) html+=`<td>${badge("part",d.part)}</td>`;
    html+=`<td>${badge("pri",d.pri)}</td><td>${badge("dev",d.dev)}</td>
      <td class="note-cell">${d.acs}</td><td class="note-cell">${d.uiux}</td></tr>`;
  });
  html+=`</tbody></table></div>`;
  el.innerHTML=html;
}

window.filterTable=function(cid,filtersEl){
  const selects=filtersEl.querySelectorAll("select");
  const input=filtersEl.querySelector("input");
  const catF=selects[0].value, priF=selects[1].value, devF=selects[2].value, search=input.value.toLowerCase();
  const rows=document.querySelector(`#${cid} tbody`).querySelectorAll("tr");
  let count=0;
  rows.forEach(r=>{
    const cat=r.dataset.cat,pri=r.dataset.pri,dev=r.dataset.dev,name=r.dataset.name.toLowerCase();
    const show=(!catF||cat===catF)&&(!priF||pri===priF)&&(!devF||dev===devF)&&(!search||name.includes(search));
    r.style.display=show?"":"none";
    if(show)count++;
  });
  document.getElementById("count-"+cid).textContent=count+"개 항목";
};

  let html=`<div class="gantt-section"><div class="gantt-wrap"><h3>Phase별 타임라인 (요구사항 기반)</h3>`;

  phases.forEach(p=>{
    const range=phaseMonths[p];
    const count=DATA.filter(d=>d.phase===p).length;
    const left=((range[0]-1)/totalM)*100;
    const width=((range[1]-range[0]+1)/totalM)*100;
    html+=`<div class="gantt-bar-wrap">
      <div class="gantt-label">${phaseNames[p]} (${count})</div>
      <div class="gantt-track">
        <div class="gantt-fill todo" style="left:${left}%;width:${width}%"></div>
        <div class="today-line" style="left:${todayPct}%"></div>
      </div>
    </div>`;
  });

  html+=`<div style="margin-left:208px;margin-top:8px"><div class="legend">
    <div class="legend-item"><div class="legend-box" style="background:#bbdefb"></div> 개발 기간</div>
    <div class="legend-item"><div style="width:2px;height:14px;background:#ff5722;display:inline-block;margin-right:2px"></div> 현재 (3월)</div>
  </div></div>`;

  // Summary table by part

  <table style="margin-top:8px;max-width:500px"><thead><tr><th>파트</th><th>총 항목</th><th>상</th><th>중</th><th>하/미정</th></tr></thead><tbody>`;
  ["ACS","UI/UX","양쪽"].forEach(p=>{
    const items=DATA.filter(d=>d.part===p);
    html+=`<tr><td>${badge("part",p)}</td><td>${items.length}</td>
      <td>${items.filter(d=>d.pri==="상").length}</td>
      <td>${items.filter(d=>d.pri==="중").length}</td>
      <td>${items.filter(d=>d.pri==="하"||d.pri==="").length}</td></tr>`;
  });
  html+=`</tbody></table></div></div>`;
  document.getElementById("tab-timeline").innerHTML=html;
})();

// Tab switching
document.querySelectorAll(".tab").forEach(t=>{
  t.onclick=()=>{
    document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));
    document.querySelectorAll(".content").forEach(x=>x.classList.remove("active"));
    t.classList.add("active");
    document.getElementById("tab-"+t.dataset.tab).classList.add("active");
  };
});
