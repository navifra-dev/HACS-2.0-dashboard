<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>H-ACS 2.0 주간 체크리스트</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Malgun Gothic','Apple SD Gothic Neo',sans-serif;background:#f0f2f5;color:#333;min-height:100vh}
.header{background:linear-gradient(135deg,#1a3a5c 0%,#2d6da8 100%);color:#fff;padding:20px 28px}
.header h1{font-size:18px;font-weight:700}
.header .sub{font-size:11px;color:#a8c8e8;margin-top:4px}
.controls{background:#fff;padding:14px 28px;border-bottom:2px solid #e0e0e0;display:flex;gap:12px;align-items:center;flex-wrap:wrap}
.controls label{font-size:12px;font-weight:600;color:#555}
.controls select{padding:6px 12px;border:1px solid #d0d8e0;border-radius:6px;font-size:12px;background:#fff}
.week-nav{display:flex;gap:8px;align-items:center;margin-left:auto}
.week-nav button{padding:6px 14px;border:1px solid #d0d8e0;border-radius:6px;background:#fff;cursor:pointer;font-size:12px;font-weight:600;color:#1a3a5c}
.week-nav button:hover{background:#edf2f7}
.week-nav .current{font-size:13px;font-weight:700;color:#1a3a5c;padding:0 8px}
.main{padding:20px 28px;display:flex;gap:20px;flex-wrap:wrap}
.panel{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);flex:1;min-width:340px;overflow:hidden}
.panel-head{padding:14px 18px;font-size:14px;font-weight:700;border-bottom:1px solid #eee;display:flex;align-items:center;justify-content:space-between}
.panel-head .name{display:flex;align-items:center;gap:8px}
.panel-head .progress{font-size:11px;color:#888}
.progress-bar{height:4px;background:#e8ecf0;border-radius:2px;margin:0 18px 0 18px;overflow:hidden}
.progress-fill{height:100%;border-radius:2px;transition:width .3s}
.task-list{padding:8px 0}
.task-item{display:flex;align-items:flex-start;padding:10px 18px;gap:10px;border-bottom:1px solid #f5f5f5;transition:background .15s}
.task-item:hover{background:#f8fafc}
.task-item.checked{opacity:.6}
.task-item.checked .task-name{text-decoration:line-through;color:#999}
.task-check{width:20px;height:20px;border:2px solid #c0c8d0;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;transition:.15s}
.task-check:hover{border-color:#1a3a5c}
.task-check.done{background:#2e7d32;border-color:#2e7d32;color:#fff}
.task-check.done::after{content:'✓';font-size:12px;font-weight:700}
.task-info{flex:1}
.task-name{font-size:12px;font-weight:600;color:#333;line-height:1.5}
.task-meta{font-size:10px;color:#999;margin-top:2px;display:flex;gap:8px;flex-wrap:wrap}
.badge{display:inline-block;padding:1px 8px;border-radius:8px;font-size:9px;font-weight:600}
.b-pm{background:#fff8e1;color:#f57f17}.b-acs{background:#e8eaf6;color:#283593}.b-uiux{background:#fce4ec;color:#880e4f}.b-plan{background:#e8f5e9;color:#2e7d32}
.b-week{background:#e3f2fd;color:#1565c0}.b-23week{background:#fff3e0;color:#e65100}.b-month{background:#f3e5f5;color:#6a1b9a}.b-milestone{background:#e0f2f1;color:#00695c}

/* 완료 보고 */
.report-section{padding:20px 28px}
.report-box{background:#fff;border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.06);overflow:hidden}
.report-head{padding:14px 18px;font-size:14px;font-weight:700;color:#1a3a5c;border-bottom:1px solid #eee;display:flex;align-items:center;gap:8px}
.report-body{padding:18px}
.report-preview{background:#1e1e1e;color:#e0e0e0;border-radius:8px;padding:16px;font-family:'Consolas','Courier New',monospace;font-size:12px;line-height:1.8;white-space:pre-wrap;max-height:400px;overflow-y:auto;margin-bottom:14px}
.report-preview .done-line{color:#4caf50}
.report-preview .pending-line{color:#ff9800}
.report-preview .header-line{color:#64b5f6;font-weight:700}
.report-preview .divider{color:#555}
.btn-row{display:flex;gap:10px;flex-wrap:wrap}
.btn{padding:8px 20px;border:none;border-radius:6px;font-size:12px;font-weight:600;cursor:pointer;transition:.15s}
.btn-primary{background:#1a3a5c;color:#fff}.btn-primary:hover{background:#2d6da8}
.btn-slack{background:#4A154B;color:#fff}.btn-slack:hover{background:#611f69}
.btn-outline{background:#fff;color:#1a3a5c;border:1px solid #d0d8e0}.btn-outline:hover{background:#edf2f7}
.btn-reset{background:#fff;color:#e53935;border:1px solid #ffcdd2}.btn-reset:hover{background:#ffebee}

/* 전체 현황 */
.summary-strip{display:flex;gap:12px;padding:16px 28px;flex-wrap:wrap}
.stat-card{background:#fff;border-radius:8px;padding:12px 16px;flex:1;min-width:120px;box-shadow:0 1px 2px rgba(0,0,0,.04);text-align:center}
.stat-card .num{font-size:20px;font-weight:700;color:#1a3a5c}
.stat-card .lbl{font-size:10px;color:#888;margin-top:2px}

/* 타임스탬프 */
.timestamp{font-size:10px;color:#aaa;padding:8px 18px;text-align:right}

.empty-msg{padding:20px;text-align:center;color:#aaa;font-size:12px}

/* 코멘트 */
.comment-input{width:100%;padding:8px 12px;border:1px solid #e0e0e0;border-radius:6px;font-size:11px;font-family:inherit;resize:vertical;min-height:28px;margin-top:4px}
.comment-input:focus{outline:none;border-color:#2d6da8}
</style>
</head>
<body>

<div class="header">
  <h1>H-ACS 2.0 주간 체크리스트</h1>
  <div class="sub">개발자별 산출물 확인 · 체크 · 완료 보고 (슬랙 복사용 리포트 자동 생성)</div>
</div>

<div class="controls">
  <label>담당자:</label>
  <select id="filterPerson">
    <option value="all">전체</option>
    <option value="소라">강소라 (PM)</option>
    <option value="익현">권익현 (ACS)</option>
    <option value="명서">최명서 (ACS)</option>
    <option value="원선">종원선 (UI/UX)</option>
    <option value="새롬">박새롬 (UI/UX)</option>
    <option value="준섭">최준섭 (기획)</option>
  </select>
  <label>주기:</label>
  <select id="filterCycle">
    <option value="all">전체</option>
    <option value="매주">매주</option>
    <option value="2~3주">2~3주</option>
    <option value="월간">월간</option>
    <option value="마일스톤">마일스톤</option>
  </select>
  <div class="week-nav">
    <button onclick="changeWeek(-1)">◀ 이전</button>
    <span class="current" id="weekLabel">3월 2주차</span>
    <button onclick="changeWeek(1)">다음 ▶</button>
  </div>
</div>

<div class="summary-strip" id="summaryStrip"></div>

<div class="main" id="mainArea"></div>

<div class="report-section">
  <div class="report-box">
    <div class="report-head">📋 슬랙 완료 보고 생성</div>
    <div class="report-body">
      <div class="report-preview" id="reportPreview">담당자를 선택하고 체크리스트를 완료하면 슬랙용 보고 메시지가 자동 생성됩니다.</div>
      <div class="btn-row">
        <button class="btn btn-primary" onclick="generateReport('all')">전체 리포트 생성</button>
        <button class="btn btn-slack" onclick="copyReport()">📋 클립보드 복사 (슬랙 붙여넣기용)</button>
        <button class="btn btn-outline" onclick="generateReport('person')">내 파트만 생성</button>
        <button class="btn btn-reset" onclick="resetAll()">↺ 전체 초기화</button>
      </div>
    </div>
  </div>
</div>

<script>
// === 데이터 ===
const MEMBERS = {
  '소라': {name:'강소라', role:'PM', color:'b-pm'},
  '익현': {name:'권익현', role:'ACS', color:'b-acs'},
  '명서': {name:'최명서', role:'ACS', color:'b-acs'},
  '원선': {name:'종원선', role:'UI/UX', color:'b-uiux'},
  '새롬': {name:'박새롬', role:'UI/UX', color:'b-uiux'},
  '준섭': {name:'최준섭', role:'기획', color:'b-plan'}
};

const TASKS = [
  // 매주
  {id:'w1', name:'주간 개발 진행 현황 PDF 작성', cycle:'매주', cycleClass:'b-week', persons:['소라'], desc:'ACS/UX·UI/기획 파트별 실적·계획 취합', deadline:'금요일'},
  {id:'w2', name:'주간 회의록 작성', cycle:'매주', cycleClass:'b-week', persons:['소라'], desc:'현대차 정기 회의 안건·결정사항·Action Item', deadline:'회의 당일'},
  {id:'w3', name:'이슈/리스크 관리 대장 갱신', cycle:'매주', cycleClass:'b-week', persons:['소라'], desc:'신규 이슈 등록, 기존 이슈 상태 업데이트', deadline:'수시(주1 리뷰)'},
  {id:'w4', name:'GitLab MR/코드 리뷰 리포트', cycle:'매주', cycleClass:'b-week', persons:['익현','명서','원선','새롬'], desc:'주간 MR 목록, 코드 리뷰 현황, 빌드 상태', deadline:'금요일'},
  {id:'w5', name:'와이어프레임/디자인 업데이트', cycle:'매주', cycleClass:'b-week', persons:['준섭'], desc:'Figma 변경사항 요약, 신규 페이지 내역', deadline:'금요일'},
  {id:'w6', name:'요구사항 추적 매트릭스(RTM) 갱신', cycle:'매주', cycleClass:'b-week', persons:['소라'], desc:'101개 요구사항 대비 진척률 업데이트', deadline:'금요일'},
  {id:'w7', name:'ACS GitLab 공동 레포 MR/이슈 관리', cycle:'매주', cycleClass:'b-week', persons:['익현','명서'], desc:'현대차 공동 레포: 브랜치 전략, MR 리뷰, 커밋 컨벤션 점검', deadline:'수시(주1 정리)'},
  {id:'w8', name:'Docker 이미지 빌드/태깅', cycle:'매주', cycleClass:'b-week', persons:['익현','명서','원선','새롬'], desc:'Docker 이미지 빌드 성공 여부, 태그 관리, Registry 푸시', deadline:'빌드 시'},

  // 2~3주
  {id:'b1', name:'기능 설계서 (상세) 작성/갱신', cycle:'2~3주', cycleClass:'b-23week', persons:['익현','명서','원선','새롬'], desc:'API 명세, 시퀀스 다이어그램, DB 스키마', deadline:'Phase 착수 시'},
  {id:'b2', name:'프로토타입/데모 빌드', cycle:'2~3주', cycleClass:'b-23week', persons:['익현','명서','원선','새롬'], desc:'동작 가능한 기능 단위 빌드, 고객 피드백용', deadline:'주요 기능 완성 시'},
  {id:'b3', name:'단위 테스트 리포트', cycle:'2~3주', cycleClass:'b-23week', persons:['익현','명서','원선','새롬'], desc:'기능별 테스트 결과, 커버리지, 버그 목록', deadline:'기능 완료 후'},
  {id:'b4', name:'현대차 협의사항 정리', cycle:'2~3주', cycleClass:'b-23week', persons:['소라'], desc:'검토중 항목 논의 결과, 변경 요청 반영', deadline:'회의 후 3일 이내'},
  {id:'b5', name:'DB 설계 문서 갱신', cycle:'2~3주', cycleClass:'b-23week', persons:['원선','새롬'], desc:'ERD, 테이블 정의서, 마이그레이션 이력', deadline:'스키마 변경 시'},
  {id:'b6', name:'Docker Compose/배포 설정 갱신', cycle:'2~3주', cycleClass:'b-23week', persons:['익현','명서','원선','새롬'], desc:'Dockerfile, docker-compose.yml, 환경변수 관리', deadline:'기능 추가 시'},

  // 월간
  {id:'m1', name:'월간 진척 보고서', cycle:'월간', cycleClass:'b-month', persons:['소라'], desc:'마일스톤 달성률, 주요 성과, 차월 계획', deadline:'매월 마지막 주'},
  {id:'m2', name:'기능요구사항 정의서 갱신', cycle:'월간', cycleClass:'b-month', persons:['소라'], desc:'변경이력 관리, 버전 업데이트', deadline:'매월 마지막 주'},
  {id:'m3', name:'WBS/마일스톤 업데이트', cycle:'월간', cycleClass:'b-month', persons:['소라'], desc:'일정 변경 반영, 지연 항목 분석', deadline:'매월 마지막 주'},
  {id:'m4', name:'Docker 이미지 릴리즈', cycle:'월간', cycleClass:'b-month', persons:['익현','명서','원선','새롬'], desc:'정식 태그 배포, Registry 관리', deadline:'매월 마지막 주'},

  // 마일스톤
  {id:'ms1', name:'아키텍처 설계서', cycle:'마일스톤', cycleClass:'b-milestone', persons:['익현','명서'], desc:'시스템 구성도, Agent/Service 구조, 통신 프로토콜', deadline:'Phase 1 완료 시(3월)'},
  {id:'ms2', name:'GitLab 협업 규칙서', cycle:'마일스톤', cycleClass:'b-milestone', persons:['익현','명서'], desc:'브랜치 전략, 커밋 컨벤션, MR 리뷰 프로세스', deadline:'Phase 1 완료 시(3월)'},
  {id:'ms3', name:'API 명세서', cycle:'마일스톤', cycleClass:'b-milestone', persons:['익현','명서','원선','새롬'], desc:'REST/MQTT 엔드포인트, VDA5050 메시지 포맷', deadline:'Phase별 기능 완료 시'},
  {id:'ms4', name:'UI/UX 스타일 가이드', cycle:'마일스톤', cycleClass:'b-milestone', persons:['준섭','원선','새롬'], desc:'디자인 시스템, 컴포넌트 규격', deadline:'Phase 6 착수 시'},
  {id:'ms5', name:'Docker 배포 가이드', cycle:'마일스톤', cycleClass:'b-milestone', persons:['익현','명서','원선','새롬'], desc:'컨테이너 구성, docker-compose, 환경변수', deadline:'Phase 1 이후 지속 갱신'},
];

// === 상태 관리 ===
let currentWeek = {month:3, week:2}; // 3월 2주차
let state = loadState();

function loadState() {
  try {
    const s = JSON.parse(localStorage.getItem('hacs_checklist') || '{}');
    return s.tasks ? s : {tasks:{}, comments:{}};
  } catch(e) { return {tasks:{}, comments:{}}; }
}

function saveState() {
  localStorage.setItem('hacs_checklist', JSON.stringify(state));
}

function getWeekKey() {
  return `${currentWeek.month}-${currentWeek.week}`;
}

function isChecked(taskId, person) {
  const key = `${getWeekKey()}_${taskId}_${person}`;
  return state.tasks[key] || false;
}

function toggleCheck(taskId, person) {
  const key = `${getWeekKey()}_${taskId}_${person}`;
  state.tasks[key] = !state.tasks[key];
  if (state.tasks[key]) {
    state.tasks[key + '_time'] = new Date().toLocaleString('ko-KR');
  }
  saveState();
  render();
}

function getComment(taskId, person) {
  const key = `${getWeekKey()}_${taskId}_${person}_comment`;
  return state.comments[key] || '';
}

function setComment(taskId, person, value) {
  const key = `${getWeekKey()}_${taskId}_${person}_comment`;
  state.comments[key] = value;
  saveState();
}

function changeWeek(delta) {
  currentWeek.week += delta;
  if (currentWeek.week > 4) { currentWeek.month++; currentWeek.week = 1; }
  if (currentWeek.week < 1) { currentWeek.month--; currentWeek.week = 4; }
  if (currentWeek.month > 12) currentWeek.month = 12;
  if (currentWeek.month < 1) currentWeek.month = 1;
  render();
}

// === 렌더링 ===
function render() {
  const filterPerson = document.getElementById('filterPerson').value;
  const filterCycle = document.getElementById('filterCycle').value;
  document.getElementById('weekLabel').textContent = `${currentWeek.month}월 ${currentWeek.week}주차`;

  // 필터링
  let filtered = TASKS.filter(t => {
    if (filterPerson !== 'all' && !t.persons.includes(filterPerson)) return false;
    if (filterCycle !== 'all' && t.cycle !== filterCycle) return false;
    return true;
  });

  // 담당자별 그룹핑
  const byPerson = {};
  filtered.forEach(t => {
    t.persons.forEach(p => {
      if (filterPerson !== 'all' && p !== filterPerson) return;
      if (!byPerson[p]) byPerson[p] = [];
      byPerson[p].push(t);
    });
  });

  // 전체 통계
  let totalCount = 0, doneCount = 0;
  Object.keys(byPerson).forEach(p => {
    byPerson[p].forEach(t => {
      totalCount++;
      if (isChecked(t.id, p)) doneCount++;
    });
  });

  // 담당자별 통계
  const personStats = {};
  Object.keys(byPerson).forEach(p => {
    const total = byPerson[p].length;
    const done = byPerson[p].filter(t => isChecked(t.id, p)).length;
    personStats[p] = {total, done};
  });

  // 요약 카드
  const strip = document.getElementById('summaryStrip');
  strip.innerHTML = `
    <div class="stat-card"><div class="num">${totalCount}</div><div class="lbl">전체 항목</div></div>
    <div class="stat-card"><div class="num" style="color:#2e7d32">${doneCount}</div><div class="lbl">완료</div></div>
    <div class="stat-card"><div class="num" style="color:#e65100">${totalCount - doneCount}</div><div class="lbl">미완료</div></div>
    <div class="stat-card"><div class="num">${totalCount > 0 ? Math.round(doneCount/totalCount*100) : 0}%</div><div class="lbl">진척률</div></div>
  `;

  // 패널 렌더링
  const main = document.getElementById('mainArea');
  main.innerHTML = '';

  Object.keys(byPerson).sort((a,b) => {
    const order = ['소라','익현','명서','원선','새롬','준섭'];
    return order.indexOf(a) - order.indexOf(b);
  }).forEach(person => {
    const m = MEMBERS[person];
    const tasks = byPerson[person];
    const stats = personStats[person];
    const pct = stats.total > 0 ? Math.round(stats.done / stats.total * 100) : 0;

    const panel = document.createElement('div');
    panel.className = 'panel';
    panel.innerHTML = `
      <div class="panel-head">
        <div class="name"><span class="badge ${m.color}">${m.role}</span> ${m.name}</div>
        <div class="progress">${stats.done}/${stats.total} (${pct}%)</div>
      </div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%;background:${pct===100?'#2e7d32':'#1565c0'}"></div></div>
      <div class="task-list">
        ${tasks.map(t => {
          const checked = isChecked(t.id, person);
          const comment = getComment(t.id, person);
          const timeKey = `${getWeekKey()}_${t.id}_${person}_time`;
          const doneTime = state.tasks[timeKey] || '';
          return `
            <div class="task-item ${checked?'checked':''}">
              <div class="task-check ${checked?'done':''}" onclick="toggleCheck('${t.id}','${person}')"></div>
              <div class="task-info">
                <div class="task-name">${t.name}</div>
                <div class="task-meta">
                  <span class="badge ${t.cycleClass}">${t.cycle}</span>
                  <span>📅 ${t.deadline}</span>
                  ${doneTime && checked ? `<span style="color:#2e7d32">✓ ${doneTime}</span>` : ''}
                </div>
                <div class="task-meta" style="color:#666">${t.desc}</div>
                <input class="comment-input" placeholder="코멘트 (선택사항 - 특이사항, 진행률 등)"
                  value="${comment.replace(/"/g,'&quot;')}"
                  onchange="setComment('${t.id}','${person}',this.value)"
                  onfocus="this.style.minHeight='48px'" onblur="if(!this.value)this.style.minHeight='28px'">
              </div>
            </div>
          `;
        }).join('')}
      </div>
      <div class="timestamp">마지막 갱신: ${new Date().toLocaleString('ko-KR')}</div>
    `;
    main.appendChild(panel);
  });

  updateReport();
}

// === 리포트 생성 ===
function generateReport(mode) {
  const filterPerson = document.getElementById('filterPerson').value;
  updateReport(mode === 'person' && filterPerson !== 'all' ? filterPerson : null);
}

function updateReport(onlyPerson) {
  const weekStr = `${currentWeek.month}월 ${currentWeek.week}주차`;
  let lines = [];
  lines.push(`📊 H-ACS 2.0 주간 산출물 현황 — ${weekStr}`);
  lines.push('─'.repeat(40));

  const persons = onlyPerson ? [onlyPerson] : Object.keys(MEMBERS);

  persons.forEach(p => {
    const m = MEMBERS[p];
    if (!m) return;
    const myTasks = TASKS.filter(t => t.persons.includes(p));
    if (myTasks.length === 0) return;

    const done = myTasks.filter(t => isChecked(t.id, p));
    const pending = myTasks.filter(t => !isChecked(t.id, p));

    lines.push('');
    lines.push(`👤 ${m.name} (${m.role}) — ${done.length}/${myTasks.length} 완료`);

    if (done.length > 0) {
      done.forEach(t => {
        const comment = getComment(t.id, p);
        const timeKey = `${getWeekKey()}_${t.id}_${p}_time`;
        const time = state.tasks[timeKey] || '';
        lines.push(`  ✅ ${t.name}${comment ? ' → ' + comment : ''}${time ? ' (' + time + ')' : ''}`);
      });
    }
    if (pending.length > 0) {
      pending.forEach(t => {
        const comment = getComment(t.id, p);
        lines.push(`  ⬜ ${t.name}${comment ? ' → ' + comment : ''}`);
      });
    }
  });

  // 전체 통계
  let totalAll = 0, doneAll = 0;
  persons.forEach(p => {
    TASKS.filter(t => t.persons.includes(p)).forEach(t => {
      totalAll++;
      if (isChecked(t.id, p)) doneAll++;
    });
  });

  lines.push('');
  lines.push('─'.repeat(40));
  lines.push(`📈 전체 진척: ${doneAll}/${totalAll} (${totalAll>0?Math.round(doneAll/totalAll*100):0}%)`);
  lines.push(`📅 기준: ${new Date().toLocaleDateString('ko-KR')}`);

  document.getElementById('reportPreview').textContent = lines.join('\n');
}

function copyReport() {
  const text = document.getElementById('reportPreview').textContent;
  navigator.clipboard.writeText(text).then(() => {
    const btn = event.target;
    const orig = btn.textContent;
    btn.textContent = '✅ 복사 완료!';
    setTimeout(() => btn.textContent = orig, 2000);
  });
}

function resetAll() {
  if (confirm(`${currentWeek.month}월 ${currentWeek.week}주차 체크리스트를 초기화할까요?`)) {
    const prefix = getWeekKey();
    Object.keys(state.tasks).forEach(k => {
      if (k.startsWith(prefix)) delete state.tasks[k];
    });
    Object.keys(state.comments).forEach(k => {
      if (k.startsWith(prefix)) delete state.comments[k];
    });
    saveState();
    render();
  }
}

// === 이벤트 ===
document.getElementById('filterPerson').onchange = render;
document.getElementById('filterCycle').onchange = render;

// 초기 렌더링
render();
</script>
